<html>
    <head>
        <title>Table style </title>
    
    </head>

    <body>
            <h2>table style </h2>
            <table>
                <tr>
                    <td>r1 ,c1</td>
                    <td>r1 , c2</td>
                    <td>r1 ,c3</td>
                </tr>
                <tr>
                    <td>r1 ,c2</td>
                    <td>r2.c2</td>
                     <td>r3,c2</td>
                </tr>
            </table>
            <style>
       
        table {
            border-spacing: 10px;
        }

        td {
            border: 1px solid black;
            border-radius: 8px;
            padding: 10px;
                box-shadow: 2px 2px 3px gray;
        }

    </style>
    </body>
</html>
